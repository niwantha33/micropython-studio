<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private AI Assistance</title>
    <!-- Modern typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown and Code Highlighting Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-color: #00aaff;
            --secondary-bg: #1a1f2b;
            --border-color: #2d333b;
            --text-color: #e6edf3;
            --text-muted: #8b949e;
            --glass-bg: rgba(26, 31, 43, 0.7);
            --gradient-accent: linear-gradient(135deg, #00aaff 0%, #0066cc 100%);
            --ai-bubble-bg: #1c2128;
            --user-bubble-bg: #005cc5;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 170, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(188, 133, 255, 0.1) 0px, transparent 50%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            padding: 16px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #58a6ff, #bc85ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: flex;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 8px;
            background: #6e7681;
        }

        .status-dot.online { background: #3fb950; box-shadow: 0 0 10px rgba(63, 185, 80, 0.5); }
        .status-dot.offline { background: #f85149; box-shadow: 0 0 10px rgba(248, 81, 73, 0.5); }
        .status-dot.warning { background: #d29922; box-shadow: 0 0 10px rgba(210, 153, 34, 0.5); }

        /* --- Chat area --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .message {
            max-width: 90%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.92rem;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            word-wrap: break-word;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--gradient-accent);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 170, 255, 0.2);
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--ai-bubble-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Markdown Styling */
        .message.ai p { margin: 8px 0; }
        .message.ai p:first-child { margin-top: 0; }
        .message.ai p:last-child { margin-bottom: 0; }
        
        .message code {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .message pre {
            background: #0d1117 !important;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin: 12px 0;
            position: relative;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--border-color);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .code-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
        }

        .message pre code {
            background: transparent;
            padding: 14px;
            display: block;
            line-height: 1.5;
            overflow-x: auto;
        }

        /* --- Input Area --- */
        .input-wrapper {
            padding: 16px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-pill {
            padding: 3px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            font-weight: 500;
        }

        .status-pill:hover {
            background: var(--border-color);
            color: var(--text-color);
            transform: translateY(-1px);
        }

        .status-pill.active {
            background: rgba(0, 170, 255, 0.1);
            border-color: rgba(0, 170, 255, 0.3);
            color: var(--accent-color);
        }

        .input-field-container {
            display: flex;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 4px;
            transition: all 0.2s ease;
        }

        .input-field-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(0, 170, 255, 0.15);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.92rem;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 200px;
            line-height: 1.4;
        }

        .send-btn {
            background: var(--gradient-accent);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin: 2px;
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: rotate(45deg);
        }

        /* --- Animations --- */
        .thinking-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 0;
        }

        .thinking-dots {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .thinking-status {
            font-size: 0.78rem;
            color: var(--accent-color);
            font-weight: 500;
            opacity: 0.9;
        }

        .thinking-timer {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'Cascadia Code', 'Consolas', monospace;
        }

        /* Legacy compat */
        .thinking {
            display: flex;
            gap: 5px;
            padding: 10px 0;
            align-items: center;
        }

        .pulse {
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse-animation 1.4s infinite ease-in-out both;
        }
        .pulse:nth-child(2) { animation-delay: 0.2s; }
        .pulse:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse-animation {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* --- Overlay --- */
        #setup-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .setup-card {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .btn-primary {
            width: 100%;
            background: var(--gradient-accent);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <h2>Micro AI</h2>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="clear-btn" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: flex; align-items: center;" title="Clear Chat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
            <div class="status-badge">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">...</span>
            </div>
        </div>
    </div>

    <div id="chat-container" class="chat-container">
        <div class="message ai">
            Hello! I'm your private assistant. How can I help you today?
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-field-container">
            <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
            <button id="send-btn" class="send-btn" title="Send (Enter)">
                <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
            </button>
        </div>
        <div class="chat-status-bar">
            <div class="status-item">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                <span id="current-file">No file open</span>
            </div>
            <div class="status-item">
                <div id="firmware-toggle" class="status-pill" title="Click to manually override">...</div>
            </div>
        </div>
    </div>

    <div id="setup-overlay">
        <div class="setup-card">
            <div style="font-size: 3.5rem; margin-bottom: 24px;">🤖</div>
            <h3 id="setup-title" style="margin: 0 0 12px 0;">Setup Required</h3>
            <p id="setup-desc" style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5;">
                Initialize your local LLM to get started with offline coding assistance.
            </p>
            <div id="error-msg" style="color: #f85149; font-size: 0.8rem; margin-top: 12px; display: none; padding: 10px; background: rgba(248,81,73,0.1); border-radius: 8px;"></div>
            <button id="setup-btn" class="btn-primary">Initialize Model</button>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const setupOverlay = document.getElementById('setup-overlay');
        const setupBtn = document.getElementById('setup-btn');
        const currentFileText = document.getElementById('current-file');
        const firmwareToggle = document.getElementById('firmware-toggle');

        let currentAiMessageElement = null;
        let isThinking = false;
        let currentFirmware = 'MicroPython';
        let chatTimerInterval = null;
        let chatStartTime = null;

        // --- Event Listeners ---
        firmwareToggle.addEventListener('click', () => {
            currentFirmware = currentFirmware === 'MicroPython' ? 'CircuitPython' : 'MicroPython';
            updateFirmwareUI(currentFirmware);
            vscode.postMessage({ type: 'setFirmware', value: currentFirmware });
        });
        clearBtn.addEventListener('click', () => {
            chatContainer.innerHTML = ''; // Clear UI
            appendMessage('ai', "Hello! I'm your private MicroPython assistant. History has been cleared.");
            vscode.postMessage({ type: 'clearHistory' });
        });

        // --- Markdown Sanitization ---
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // Configure Modern Markdown Parser (marked.js v10+)
        marked.use({
            renderer: {
                code(token) {
                    const code = token.text;
                    const language = token.lang || 'python';
                    const highlighted = hljs.getLanguage(language) 
                        ? hljs.highlight(code, { language }).value 
                        : hljs.highlightAuto(code).value;

                    return `<div class="code-block-container"><pre><div class="code-header"><span>${language}</span><div class="code-actions"><button class="action-btn" onclick="handleAction('copy', this)" title="Copy to clipboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span>Copy</span></button><button class="action-btn" onclick="handleAction('insert', this)" title="Insert into editor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg><span>Insert</span></button><button class="action-btn" onclick="handleAction('run', this)" title="Run on device"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><span>Run</span></button><button class="action-btn" onclick="handleAction('new', this)" title="New file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><span>New</span></button></div></div><code class="hljs language-${language}">${highlighted}</code><textarea style="display:none" class="raw-code">${escapeHtml(code)}</textarea></pre></div>`;
                }
            }
        });

        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        setupBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'installModel' });
            setupBtn.disabled = true;
            setupBtn.textContent = 'Installing...';
        });

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isThinking) return;

            appendMessage('user', text);
            vscode.postMessage({ type: 'sendMessage', value: text });
            
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Create thinking indicator with status
            currentAiMessageElement = createAiBubble();
            showThinkingIndicator('Sending message...');
            isThinking = true;
            startChatTimer();
            scrollToBottom();
        }

        function showThinkingIndicator(statusText) {
            if (!currentAiMessageElement) return;
            const timerText = chatStartTime ? formatElapsed(Date.now() - chatStartTime) : '0s';
            currentAiMessageElement.innerHTML = `
                <div class="thinking-container">
                    <div class="thinking-dots">
                        <div class="pulse"></div>
                        <div class="pulse"></div>
                        <div class="pulse"></div>
                    </div>
                    <div class="thinking-status">${statusText}</div>
                    <div class="thinking-timer">${timerText}</div>
                </div>
            `;
        }

        function startChatTimer() {
            chatStartTime = Date.now();
            if (chatTimerInterval) clearInterval(chatTimerInterval);
            chatTimerInterval = setInterval(() => {
                if (!isThinking || !currentAiMessageElement) {
                    clearInterval(chatTimerInterval);
                    return;
                }
                const timerEl = currentAiMessageElement.querySelector('.thinking-timer');
                if (timerEl) {
                    timerEl.textContent = formatElapsed(Date.now() - chatStartTime);
                }
            }, 1000);
        }

        function stopChatTimer() {
            if (chatTimerInterval) {
                clearInterval(chatTimerInterval);
                chatTimerInterval = null;
            }
            chatStartTime = null;
        }

        function formatElapsed(ms) {
            const seconds = Math.floor(ms / 1000);
            if (seconds < 60) return seconds + 's';
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return minutes + 'm ' + secs + 's';
        }

        function createAiBubble() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.dataset.content = ""; // Raw markdown accumulator
            chatContainer.appendChild(div);
            return div;
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'user') {
                div.textContent = text;
            } else {
                div.innerHTML = marked.parse(text);
            }
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        window.handleAction = function(type, btn) {
            const code = btn.closest('pre').querySelector('textarea').value;
            vscode.postMessage({ type: 'codeAction', action: type, value: code });
            
            // Subtle visual feedback
            const originalText = btn.querySelector('span').textContent;
            btn.querySelector('span').textContent = 'Done!';
            btn.style.color = '#3fb950';
            setTimeout(() => {
                btn.querySelector('span').textContent = originalText;
                btn.style.color = '';
            }, 1000);
        };

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'status':
                    updateStatus(message.value);
                    break;
                case 'historySync':
                    if (message.value && message.value.length > 0) {
                        chatContainer.innerHTML = '';
                        message.value.forEach(m => {
                            if (m.role !== 'system') {
                                appendMessage(m.role == 'assistant' ? 'ai' : 'user', m.content);
                            }
                        });
                    }
                    break;
                case 'chatResponse':
                    if (currentAiMessageElement) {
                        if (isThinking) {
                            currentAiMessageElement.innerHTML = '';
                            currentAiMessageElement.dataset.content = '';
                            isThinking = false;
                        }
                        currentAiMessageElement.dataset.content += message.value;
                        currentAiMessageElement.innerHTML = marked.parse(currentAiMessageElement.dataset.content);
                        currentAiMessageElement.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                        scrollToBottom();
                    }
                    break;
                case 'chatStream':
                    // Streaming tokens from HTTP API
                    if (!currentAiMessageElement) {
                        currentAiMessageElement = createAiBubble();
                    }
                    if (isThinking) {
                        currentAiMessageElement.innerHTML = '';
                        currentAiMessageElement.dataset.content = '';
                        isThinking = false;
                    }
                    currentAiMessageElement.dataset.content += message.value;
                    currentAiMessageElement.innerHTML = marked.parse(currentAiMessageElement.dataset.content);
                    currentAiMessageElement.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                    scrollToBottom();
                    break;
                case 'chatStart':
                    // Backend signals it's starting — ensure thinking bubble exists
                    if (!currentAiMessageElement) {
                        currentAiMessageElement = createAiBubble();
                        isThinking = true;
                        startChatTimer();
                    }
                    showThinkingIndicator('Connecting to AI...');
                    scrollToBottom();
                    break;
                case 'chatStatus':
                    // Update the thinking indicator with real status text
                    if (isThinking && currentAiMessageElement) {
                        showThinkingIndicator(message.value);
                        scrollToBottom();
                    }
                    break;
                case 'chatDone':
                    isThinking = false;
                    stopChatTimer();
                    currentAiMessageElement = null;
                    break;
                case 'autoError':
                    // Automatically injected device error — show user bubble + thinking state
                    if (isThinking) break; // AI already busy
                    appendMessage('user', message.value);
                    currentAiMessageElement = document.createElement('div');
                    currentAiMessageElement.className = 'message assistant';
                    currentAiMessageElement.dataset.content = '';
                    currentAiMessageElement.innerHTML = `
                        <div class="message-label">AI</div>
                        <div class="message-content thinking-dots">Thinking...</div>
                    `;
                    chatContainer.appendChild(currentAiMessageElement);
                    isThinking = true;
                    scrollToBottom();
                    break;
                case 'installProgress':
                    document.getElementById('setup-desc').textContent = message.value;
                    break;
                case 'installSuccess':
                    setupOverlay.style.display = 'none';
                    break;
                case 'contextUpdate':
                    if (message.value.fileName) currentFileText.textContent = message.value.fileName;
                    if (message.value.firmware) {
                        currentFirmware = message.value.firmware;
                        updateFirmwareUI(currentFirmware);
                    }
                    break;
                case 'error':
                    const errorEl = document.getElementById('error-msg');
                    errorEl.textContent = message.value;
                    errorEl.style.display = 'block';
                    setupBtn.disabled = false;
                    setupBtn.textContent = (statusText.textContent === 'Ollama Offline') ? 'Download Ollama' : 'Retry Initialization';
                    console.error(message.value);
                    break;
            }
        });

        function updateFirmwareUI(firmware) {
            firmwareToggle.textContent = firmware;
            firmwareToggle.className = 'status-pill' + (firmware === 'CircuitPython' ? ' active' : '');
            firmwareToggle.title = `Using ${firmware} context - click to toggle`;
        }

        function updateStatus(status) {
            const errorEl = document.getElementById('error-msg');
            if (status.connected) errorEl.style.display = 'none';

            if (!status.connected) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Ollama Offline';
                showSetup('Ollama Not Found', 'Ollama is required for private AI features. Please install and run it to continue.');
                setupBtn.textContent = 'Download Ollama';
                setupBtn.disabled = false;
                setupBtn.onclick = () => {
                    // Try to open external URL via VS Code
                    vscode.postMessage({ type: 'openLink', value: 'https://ollama.com' });
                };
            } else if (!status.installed) {
                statusDot.className = 'status-dot warning';
                statusText.textContent = 'Model Missing';
                showSetup('Initialization Needed', 'We need to prepare the specialized "Micropython and Circuitpython" AI Model');
                setupBtn.textContent = 'Initialize Model';
                setupBtn.disabled = false;
                setupBtn.onclick = () => {
                    errorEl.style.display = 'none';
                    vscode.postMessage({ type: 'installModel' });
                    setupBtn.disabled = true;
                    setupBtn.textContent = 'Installing...';
                };
            } else {
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Ready';
                setupOverlay.style.display = 'none';
            }
        }

        function showSetup(title, desc) {
            setupOverlay.style.display = 'flex';
            document.getElementById('setup-title').textContent = title;
            document.getElementById('setup-desc').textContent = desc;
        }
    </script>
</body>
</html>
